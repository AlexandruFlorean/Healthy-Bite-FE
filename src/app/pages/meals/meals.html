<div class="cards-grid">
      @for (meal of meals(); track meal.id) {
        <mat-card class="meal-card">
          <mat-card-header>
            <mat-card-title>{{ meal.name }}</mat-card-title>
            <mat-card-subtitle>Ingrediente: {{ meal.mealIngredients.length }}</mat-card-subtitle>
          </mat-card-header>
          
          <mat-card-content>
            <mat-chip-set class="nutrition-chips">
            <mat-chip highlighted color="accent">{{ meal.calories }} kcal</mat-chip>
            <mat-chip highlighted color="primary">{{ meal.proteins }}g proteine</mat-chip>
            </mat-chip-set>

            <ul class="ingredients-list">
              @for (ing of meal.mealIngredients; track $index) {
                <li>{{ ing.ingredientName }} - {{ ing.quantity }}g</li>
              }
            </ul>
          </mat-card-content>

          <mat-card-actions>
              <button mat-button>Detalii</button>
              <button mat-button type="button" (click)="deleteMeal(meal)" >Șterge</button>
          </mat-card-actions>
        </mat-card>
      } 
    </div>
