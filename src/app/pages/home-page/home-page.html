<div class="meals-container">
  
  <div class="main-content">
    <h1>Mesele Mele</h1>

    <button mat-raised-button color="primary" routerLink="/new-meal">
      <mat-icon>add</mat-icon> Adaugă Masă
    </button>
    
    <meals [filterDate]="selectedDateString" ></meals>
    
  </div>

  <div class="summary-wrapper">
       <app-progress-spinner></app-progress-spinner>
    </div>

  <div class="sidebar">
    <div class="sticky-calendar">
      <calendar (onDateChange)="selectedDateString = $event" ></calendar>
    </div>
  </div>

</div>
